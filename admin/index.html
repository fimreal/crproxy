<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crproxy 管理控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--gray-800);
            line-height: 1.6;
        }

        .login-container {
            max-width: 420px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .login-header h1 {
            color: var(--gray-900);
            font-size: 28px;
            font-weight: 700;
        }

        .login-header p {
            color: var(--gray-600);
            margin-top: 8px;
        }

        .login-form input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .login-form button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-form button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .error-message {
            color: var(--danger);
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            padding: 12px;
            background: #fef2f2;
            border-radius: 6px;
        }

        #app {
            display: none;
            background: var(--gray-50);
            min-height: 100vh;
        }

        .app-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 24px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .app-header .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .app-header .subtitle {
            opacity: 0.9;
            font-size: 14px;
            margin-top: 4px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .tabs {
            background: white;
            margin-bottom: 24px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
        }

        .tab-btn {
            flex: 1;
            padding: 16px 32px;
            background: white;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            color: var(--gray-600);
        }

        .tab-btn:hover {
            background: var(--gray-50);
            color: var(--gray-800);
        }

        .tab-btn.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
            background: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--gray-100);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        th {
            background: var(--gray-50);
            font-weight: 600;
            color: var(--gray-700);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background: var(--gray-50);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .btn-secondary:hover {
            background: var(--gray-300);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gray-700);
            font-size: 14px;
            min-height: 22px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            height: 46px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input[readonly] {
            background: var(--gray-100);
            cursor: not-allowed;
        }

        .form-group .btn {
            height: 46px;
            min-width: 120px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 28px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .stat-card.green {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        }

        .stat-card.orange {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
        }

        .stat-card.blue {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        }

        .stat-card.red {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.95;
            position: relative;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 12px;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .modal-content h3 {
            color: var(--gray-900);
            font-size: 20px;
            margin-bottom: 12px;
        }

        .modal-content p {
            margin: 16px 0 24px 0;
            color: var(--gray-600);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-buttons .btn {
            min-width: 100px;
            padding: 12px 24px;
        }

        .warning-box {
            margin-top: 32px;
            padding: 20px;
            background: #fffbeb;
            border-radius: 8px;
            border-left: 4px solid var(--warning);
        }

        .warning-box h3 {
            color: #92400e;
            margin: 0 0 8px 0;
            font-size: 16px;
        }

        .warning-box p {
            color: #78350f;
            margin: 0 0 16px 0;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--gray-600);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 24px;
            color: var(--gray-600);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-primary {
            background: #dbeafe;
            color: #1e40af;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                border-bottom: none;
                border-left: 3px solid transparent;
            }

            .tab-btn.active {
                border-left-color: var(--primary);
            }
        }

        /* 确保 toast 支持多行 */
        .toast {
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="login-page" class="login-container">
        <div class="login-header">
            <div class="icon">🔐</div>
            <h1>crproxy</h1>
            <p>容器镜像代理管理控制台</p>
        </div>
        <form class="login-form" onsubmit="handleLogin(event)">
            <input type="password" id="password" placeholder="输入管理密码" required>
            <button type="submit">登录</button>
        </form>
        <div id="login-error" class="error-message" style="display: none;"></div>
    </div>

    <!-- 主应用 -->
    <div id="app">
        <div class="app-header">
            <div class="container">
                <div>
                    <h1>🚀 crproxy 管理控制台</h1>
                    <div class="subtitle">容器镜像代理配置管理系统</div>
                </div>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('config')">⚙️ 配置管理</button>
                <button class="tab-btn" onclick="switchTab('stats')">📊 运行统计</button>
            </div>

            <!-- 配置管理 -->
            <div id="config-tab" class="tab-content active">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📦 Registry 映射配置</h2>
                    </div>
                    <table id="registry-table">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>URL</th>
                                <th style="width: 120px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="registry-tbody"></tbody>
                    </table>

                    <h3 style="margin: 24px 0 16px 0; color: var(--gray-800);">添加新映射</h3>
                    <div class="form-grid" style="grid-template-columns: 1fr 2fr auto; gap: 16px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>名称</label>
                            <input type="text" id="new-registry-name" placeholder="例如: gcr">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>URL</label>
                            <input type="text" id="new-registry-url" placeholder="例如: https://gcr.io">
                        </div>
                        <div class="form-group" style="margin-bottom: 0; display: flex; align-items: flex-end;">
                            <button class="btn btn-primary" onclick="addRegistry()">➕ 添加</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">⚙️ 服务参数配置</h2>
                    </div>
                    <form id="service-config-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>默认 Registry</label>
                                <input type="text" id="default-registry" placeholder="https://registry-1.docker.io">
                            </div>
                            <div class="form-group">
                                <label>域名后缀</label>
                                <input type="text" id="domain-suffix" placeholder="例如: mydomain.com">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>日志级别</label>
                                <select id="log-level">
                                    <option value="debug">Debug</option>
                                    <option value="info">Info</option>
                                    <option value="warn">Warn</option>
                                    <option value="error">Error</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>缓存目录 <span class="badge badge-primary">需重启生效</span></label>
                                <input type="text" id="cache-dir" placeholder="/path/to/cache">
                            </div>
                        </div>
                        <button type="button" class="btn btn-success" onclick="saveConfig()">💾 保存配置</button>
                    </form>
                </div>
            </div>

            <!-- 运行统计 -->
            <div id="stats-tab" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">🔄 系统更新</h2>
                    </div>
                    <div id="update-info" class="loading">正在检查更新...</div>
                    <div id="update-actions" style="display: none; margin-top: 16px;">
                        <button id="update-btn" class="btn btn-primary" onclick="doUpdate()">⬆️ 更新到最新版本</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📊 请求统计</h2>
                    </div>
                    <div class="stats-grid" id="request-stats"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">💾 缓存统计</h2>
                    </div>
                    <div class="stats-grid" id="cache-stats"></div>

                    <div class="warning-box">
                        <h3>⚠️ 危险操作</h3>
                        <p>清空缓存将删除所有缓存的镜像层，后续请求将重新从源仓库下载。</p>
                        <button class="btn btn-danger" onclick="confirmClearCache()">🗑️ 清空缓存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">⚠️</div>
            <h3>确认清空缓存？</h3>
            <p>此操作将删除所有缓存文件，无法恢复。</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" onclick="clearCache()">确认清空</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('admin_token');
        let updateChecked = false;

        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                showApp();
            }
        });

        // 登录处理
        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    showApp();
                } else {
                    const errorDiv = document.getElementById('login-error');
                    errorDiv.textContent = data.error || '登录失败';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                const errorDiv = document.getElementById('login-error');
                errorDiv.textContent = '网络错误，请重试';
                errorDiv.style.display = 'block';
            }
        }

        // 显示主应用
        function showApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadConfig();
            loadStats();
            // 自动刷新统计
            setInterval(loadStats, 5000);
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('admin_token');
            token = null;
            location.reload();
        }

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');

            if (tabName === 'stats') {
                loadStats();
            }
        }

        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch('/admin/api/config', {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const config = await response.json();

                // 填充 Registry 表格
                const tbody = document.getElementById('registry-tbody');
                tbody.innerHTML = '';
                for (const [name, url] of Object.entries(config.registryMap || {})) {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${name}</strong></td>
                            <td>${url}</td>
                            <td>
                                ${name !== 'default' ? `<button class="btn btn-danger" onclick="deleteRegistry('${name}')">删除</button>` : ''}
                            </td>
                        </tr>
                    `;
                }

                // 填充服务参数表单
                document.getElementById('default-registry').value = config.defaultRegistry || '';
                document.getElementById('domain-suffix').value = config.domainSuffix || '';
                document.getElementById('log-level').value = config.logLevel || 'info';
                document.getElementById('cache-dir').value = config.cacheDir || '(未启用)';
            } catch (error) {
                showToast('加载配置失败: ' + error.message, 'error');
            }
        }

        // 保存配置
        async function saveConfig() {
            try {
                // 先获取当前完整配置
                const currentResponse = await fetch('/admin/api/config', {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                if (!currentResponse.ok) {
                    showToast('获取当前配置失败', 'error');
                    return;
                }

                const currentConfig = await currentResponse.json();

                // 只更新修改的字段
                const cacheDir = document.getElementById('cache-dir').value;
                currentConfig.defaultRegistry = document.getElementById('default-registry').value;
                currentConfig.domainSuffix = document.getElementById('domain-suffix').value;
                currentConfig.logLevel = document.getElementById('log-level').value;
                if (cacheDir && cacheDir !== '(未启用)') {
                    currentConfig.cacheDir = cacheDir;
                }

                // 发送完整配置
                const response = await fetch('/admin/api/config', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(currentConfig)
                });

                const data = await response.json();

                if (response.ok) {
                    let message = '✅ 配置已保存并实时生效';
                    if (cacheDir && cacheDir !== '(未启用)') {
                        message += '\n⚠️ 缓存目录修改需要重启服务才能生效';
                    }
                    showToast(message, 'success');
                    loadConfig();
                } else {
                    showToast(data.error || '保存失败', 'error');
                }
            } catch (error) {
                showToast('保存配置失败: ' + error.message, 'error');
            }
        }

        // 添加 Registry
        async function addRegistry() {
            const name = document.getElementById('new-registry-name').value.trim();
            const url = document.getElementById('new-registry-url').value.trim();

            if (!name || !url) {
                showToast('请填写名称和URL', 'error');
                return;
            }

            try {
                const response = await fetch('/admin/api/registry', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({name, url})
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('✅ 添加成功', 'success');
                    document.getElementById('new-registry-name').value = '';
                    document.getElementById('new-registry-url').value = '';
                    loadConfig();
                } else {
                    showToast(data.error || '添加失败', 'error');
                }
            } catch (error) {
                showToast('添加失败: ' + error.message, 'error');
            }
        }

        // 删除 Registry
        async function deleteRegistry(name) {
            if (!confirm(`确定要删除 registry "${name}" 吗？`)) {
                return;
            }

            try {
                const response = await fetch(`/admin/api/registry/${name}`, {
                    method: 'DELETE',
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('✅ 删除成功', 'success');
                    loadConfig();
                } else {
                    showToast(data.error || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        // 加载统计
        async function loadStats() {
            // 只在首次加载时检查更新
            if (!updateChecked) {
                checkUpdate();
                updateChecked = true;
            }

            try {
                // 请求统计
                const reqResponse = await fetch('/admin/api/stats', {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                if (reqResponse.status === 401) {
                    logout();
                    return;
                }

                const reqStats = await reqResponse.json();
                const totalReqs = reqStats.totalRequests || 0;
                const cacheHits = reqStats.cacheHits || 0;
                const hitRate = totalReqs > 0 ? ((cacheHits / totalReqs) * 100).toFixed(1) : 0;

                document.getElementById('request-stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${totalReqs}</div>
                        <div class="stat-label">请求总数</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-value">${cacheHits}</div>
                        <div class="stat-label">缓存命中</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-value">${reqStats.cacheMisses || 0}</div>
                        <div class="stat-label">缓存未命中</div>
                    </div>
                    <div class="stat-card blue">
                        <div class="stat-value">${hitRate}%</div>
                        <div class="stat-label">命中率</div>
                    </div>
                `;

                // 缓存统计
                const cacheResponse = await fetch('/admin/api/cache/stats', {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                const cacheStats = await cacheResponse.json();

                if (cacheStats.enabled) {
                    const sizeInMB = (cacheStats.totalSize / 1024 / 1024).toFixed(2);
                    document.getElementById('cache-stats').innerHTML = `
                        <div class="stat-card">
                            <div class="stat-value">${cacheStats.fileCount}</div>
                            <div class="stat-label">缓存文件数</div>
                        </div>
                        <div class="stat-card green">
                            <div class="stat-value">${sizeInMB} MB</div>
                            <div class="stat-label">总大小</div>
                        </div>
                    `;
                } else {
                    document.getElementById('cache-stats').innerHTML = `
                        <div class="stat-card">
                            <div class="stat-value">未启用</div>
                            <div class="stat-label">缓存状态</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 确认清空缓存
        function confirmClearCache() {
            document.getElementById('confirm-modal').classList.add('show');
        }

        // 关闭对话框
        function closeModal() {
            document.getElementById('confirm-modal').classList.remove('show');
        }

        // 清空缓存
        async function clearCache() {
            closeModal();

            try {
                const response = await fetch('/admin/api/cache/clear', {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const data = await response.json();

                if (response.ok) {
                    showToast(`✅ 缓存已清空，删除了 ${data.deleted} 个文件`, 'success');
                    loadStats();
                } else {
                    showToast(data.error || '清空失败', 'error');
                }
            } catch (error) {
                showToast('清空缓存失败: ' + error.message, 'error');
            }
        }

        // Toast 通知
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 检查更新
        async function checkUpdate() {
            try {
                const response = await fetch('/admin/api/update/check', {
                    headers: {'Authorization': `Bearer ${token}`}
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const info = await response.json();
                const updateInfoDiv = document.getElementById('update-info');
                const updateActionsDiv = document.getElementById('update-actions');

                if (info.hasUpdate) {
                    updateInfoDiv.innerHTML = `
                        <div class="stats-grid" style="margin-bottom: 0;">
                            <div class="stat-card">
                                <div class="stat-value">${info.currentVersion}</div>
                                <div class="stat-label">当前版本</div>
                            </div>
                            <div class="stat-card green">
                                <div class="stat-value">${info.latestVersion}</div>
                                <div class="stat-label">最新版本</div>
                            </div>
                        </div>
                    `;
                    updateActionsDiv.style.display = 'block';
                } else {
                    updateInfoDiv.innerHTML = `
                        <div class="stats-grid" style="margin-bottom: 0;">
                            <div class="stat-card green">
                                <div class="stat-value">${info.currentVersion}</div>
                                <div class="stat-label">当前版本 (已是最新)</div>
                            </div>
                        </div>
                    `;
                    updateActionsDiv.style.display = 'none';
                }
            } catch (error) {
                document.getElementById('update-info').innerHTML = `
                    <div style="color: var(--danger);">检查更新失败: ${error.message}</div>
                `;
            }
        }

        // 执行更新
        async function doUpdate() {
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 更新中...';

            try {
                const response = await fetch('/admin/api/update', {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`}
                });

                const data = await response.json();

                if (response.ok) {
                    showToast(`✅ ${data.message}\n新版本: ${data.newVersion}`, 'success');
                    // 重新检查更新状态
                    setTimeout(checkUpdate, 1000);
                } else {
                    showToast(data.error || '更新失败', 'error');
                    btn.disabled = false;
                    btn.textContent = '⬆️ 更新到最新版本';
                }
            } catch (error) {
                showToast('更新失败: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '⬆️ 更新到最新版本';
            }
        }
    </script>
</body>
</html>
