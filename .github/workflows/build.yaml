name: Build and Release

on:
  push:
    tags:
      - "v*"
      - "release-*"

jobs:
  release:
    name: release publish
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: go build
        run: make all && ls -l bin

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            bin/crproxy-linux-amd64
            bin/crproxy-linux-arm64
            bin/crproxy-darwin-amd64
            bin/crproxy-darwin-arm64
            bin/crproxy-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: docker build and push to dockerhub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          file: Dockerfile
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |-
            org.opencontainers.image.title=crproxy
            org.opencontainers.image.description=crproxy is a proxy server for container registry.
            org.opencontainers.image.url=${{ github.event.repository.html_url }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crproxy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crproxy:${{ github.ref_name }}
